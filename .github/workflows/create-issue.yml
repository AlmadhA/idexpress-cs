name: Create Issue
on:
  workflow_dispatch:
    inputs:
      title:
        required: true
      body:
        required: true

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: 'AlmadhA',
              repo: 'idexpress-cs-tickets',
              title: '${{ inputs.title }}',
              body: '${{ inputs.body }}'
            })
